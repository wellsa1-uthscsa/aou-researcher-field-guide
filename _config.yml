title: The All of Us Researcher Field Guide
description: Practical methods for reproducible EHR, genomic, and wearable data analysis in the All of Us Researcher Workbench.
theme: just-the-docs

url: "https://wellsa1-uthscsa.github.io"
baseurl: "/aou-researcher-field-guide"

color_scheme: aou_navy
search_enabled: true
heading_anchors: true
nav_enabled: true
nav_sort: case_sensitive
back_to_top: true
back_to_top_text: "Back to top"

aux_links:
  "View on GitHub":
    - "https://github.com/wellsa1-uthscsa/aou-researcher-field-guide"
aux_links_new_tab: true

footer_content: "A practical, community-oriented guide to reproducible analysis in the All of Us Researcher Workbench. This independent resource is not an official All of Us Research Program publication."

callouts_level: quiet
callouts:
  note:
    title: Note
    color: blue
  wisdom:
    title: AoU Wisdom
    color: navy
  warning:
    title: Caution
    color: yellow
  privacy:
    title: Privacy and Data-Safety Reminder
    color: red

mermaid:
  version: "10.9.1"

defaults:
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
